<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 254 64" role="img" aria-label="Varholdt AI">
  <defs>
    <linearGradient id="tile" x1="12" y1="6" x2="54" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#252b36"/>
      <stop offset=".46" stop-color="#0f141d"/>
      <stop offset="1" stop-color="#05070b"/>
    </linearGradient>
    <linearGradient id="rim" x1="14" y1="8" x2="50" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".72"/>
      <stop offset=".48" stop-color="#a6c8f2" stop-opacity=".42"/>
      <stop offset="1" stop-color="#5f8fc7" stop-opacity=".18"/>
    </linearGradient>
    <linearGradient id="v" x1="19" y1="18" x2="45" y2="46" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset=".48" stop-color="#eef6ff"/>
      <stop offset="1" stop-color="#a6c8f2"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="145%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="6" stdDeviation="5" flood-color="#000000" flood-opacity=".45"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="0" stdDeviation="2.4" flood-color="#a6c8f2" flood-opacity=".28"/>
    </filter>
  </defs>
  <g>
    <rect x="5" y="5" width="54" height="54" rx="15" fill="url(#tile)" filter="url(#shadow)"/>
    <rect x="6.25" y="6.25" width="51.5" height="51.5" rx="13.75" fill="none" stroke="url(#rim)" stroke-width="1.5"/>
    <path d="M19 19.5 31.9 45 45 19.5" fill="none" stroke="url(#v)" stroke-width="8.8" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
    <path d="M31.9 45 45 19.5" fill="none" stroke="#a6c8f2" stroke-width="4.2" stroke-linecap="round" stroke-linejoin="round" opacity=".78"/>
  </g>
  <text x="82" y="37" fill="#f5f8ff" font-family="DM Sans, Inter, Helvetica Neue, Arial, sans-serif" font-size="26" font-weight="700" letter-spacing="-.4">Varholdt AI</text>
  <text x="84" y="52" fill="#aeb8c8" font-family="JetBrains Mono, SFMono-Regular, ui-monospace, monospace" font-size="8.5" font-weight="500" letter-spacing="1.8">WORKFLOW AGENTS</text>
</svg>
