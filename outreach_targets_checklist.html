    button.ghost { background: transparent; color: var(--ink); }

    .board { display: grid; gap: 10px; }
    .card {

      grid-template-columns: 38px 1.15fr .9fr .8fr .7fr;
      gap: 14px;
      align-items: start;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      box-shadow: var(--shadow);
    }
    .card.done { background: var(--done); opacity: .68; }
    .check { width: 22px; height: 22px; accent-color: var(--accent); margin-top: 3px; }
    .company { margin: 0 0 6px; font-size: 17px; line-height: 1.2; }
    .meta { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
    .pill { display: inline-flex; align-items: center; min-height: 23px; padding: 2px 8px; border-radius: 999px; background: var(--soft); color: #9ce6dc; font-size: 12px; font-weight: 700; }

    .field { margin: 0 0 8px; font-size: 13px; color: var(--muted); }
    .field strong { display: block; color: var(--ink); font-size: 12px; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 2px; }
    a { color: #77ddcd; font-weight: 700; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }

    .status-select { width: 100%; height: 36px; margin-bottom: 8px; }
    textarea { width: 100%; min-height: 84px; padding: 9px; resize: vertical; font-size: 13px; }
    .empty { padding: 32px; text-align: center; color: var(--muted); background: var(--panel); border: 1px solid var(--line); border-radius: 8px; }
    @media (max-width: 1060px) {

      .card { grid-template-columns: 34px 1fr; }
      .card > section { grid-column: 2; }

    @media (max-width: 640px) {
      .wrap { width: min(100vw - 20px, 1440px); }
      .title-row { display: block; }
      .progress { text-align: left; margin-top: 12px; }
      .controls { grid-template-columns: 1fr; }
      .card { padding: 12px; gap: 10px; }
      h1 { font-size: 21px; }

  </style>

sional tax/accounting firm with secure encrypted client portal","workflow_hook":"Secure file uploads/downloads, tax/accounting documentation, client communication","outreach_angle":"Pitch review queue and document classification for secure portal workflows","channel":"Cold email","status":"New","notes":"Official page describes secure encrypted portal."}];
    const storageKey = 'varholdt-outreach-targets-v1';
    const statuses = ['New', 'Contacted', 'Replied', 'Call booked', 'Not fit'];
    const state = JSON.parse(localStorage.getItem(storageKey) || '{}');
    const els = {
      board: document.querySelector('#board'),
      search: document.querySelector('#search'),
      segment: document.querySelector('#segment'),
      priority: document.querySelector('#priority'),
      statusFilter: document.querySelector('#statusFilter'),
      hideDone: document.querySelector('#hideDone'),
      export: document.querySelector('#export'),
      progressText: document.querySelector('#progressText'),
      progressBar: document.querySelector('#progressBar')
    };
    let hideDone = false;

    function idFor(target) {
      return target.company.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
    }
    function getTargetState(id) {
      return state[id] || { done: false, status: 'New', note: '' };
    }
    function save() {
      localStorage.setItem(storageKey, JSON.stringify(state));
      updateProgress();
    }
    function escapeHtml(value = '') {
      return String(value).replace(/[&<>"']/g, char => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' }[char]));
    }
    function matches(target) {
      const id = idFor(target);
      const saved = getTargetState(id);
      const q = els.search.value.trim().toLowerCase();
      const haystack = Object.values(target).join(' ').toLowerCase() + ' ' + saved.note.toLowerCase() + ' ' + saved.status.toLowerCase();
      if (q && !haystack.includes(q)) return false;
      if (els.segment.value && target.segment !== els.segment.value) return false;
      if (els.priority.value && target.priority !== els.priority.value) return false;
      if (els.statusFilter.value && saved.status !== els.statusFilter.value) return false;
      if (hideDone && saved.done) return false;
      return true;
    }
    function renderSegmentOptions() {
      const segments = [...new Set(targets.map(t => t.segment))];
      els.segment.innerHTML = '<option value="">All segments</option>' + segments.map(s => `<option>${escapeHtml(s)}</option>`).join('');
    }
    function render() {
      const visible = targets.filter(matches);
      els.board.innerHTML = visible.length ? visible.map(target => {
        const id = idFor(target);
        const saved = getTargetState(id);
        const priorityClass = target.priority === 'High' ? 'priority-high' : '';
        return `
          <article class="card ${saved.done ? 'done' : ''}" data-id="${id}">
            <input class="check" type="checkbox" ${saved.done ? 'checked' : ''} aria-label="Mark ${escapeHtml(target.company)} contacted" />
            <section>
              <h2 class="company">${escapeHtml(target.company)}</h2>
              <div class="meta">
                <span class="pill ${priorityClass}">${escapeHtml(target.priority)}</span>
                <span class="pill">${escapeHtml(target.segment)}</span>
                <span class="pill">${escapeHtml(target.location)}</span>
              </div>
              <p class="field"><strong>Contact</strong>${escapeHtml(target.public_contact)}</p>
              <p class="field"><strong>Likely buyer</strong>${escapeHtml(target.likely_buyer_role)}</p>
              <div class="actions">
                <a href="${escapeHtml(target.website)}" target="_blank" rel="noopener">Website</a>
                <a href="${escapeHtml(target.source_url)}" target="_blank" rel="noopener">Source</a>
              </div>
            </section>
            <section>
              <p class="field"><strong>Why fit</strong>${escapeHtml(target.why_fit)}</p>
              <p class="field"><strong>Workflow hook</strong>${escapeHtml(target.workflow_hook)}</p>
            </section>
            <section>
              <p class="field"><strong>Outreach angle</strong>${escapeHtml(target.outreach_angle)}</p>
              <p class="field"><strong>Notes from research</strong>${escapeHtml(target.notes || '')}</p>
            </section>
            <section>
              <select class="status-select" aria-label="Status for ${escapeHtml(target.company)}">
                ${statuses.map(s => `<option ${saved.status === s ? 'selected' : ''}>${s}</option>`).join('')}
              </select>
              <textarea placeholder="Call notes, sent date, follow-up...">${escapeHtml(saved.note || '')}</textarea>
            </section>
          </article>`;
      }).join('') : '<div class="empty">No targets match the current filters.</div>';
      bindCards();
      updateProgress();
    }
    function bindCards() {
      document.querySelectorAll('.card').forEach(card => {
        const id = card.dataset.id;
        state[id] = getTargetState(id);
        card.querySelector('.check').addEventListener('change', event => {
          state[id].done = event.target.checked;
          if (event.target.checked && state[id].status === 'New') state[id].status = 'Contacted';
          save();
          render();
        });
        card.querySelector('.status-select').addEventListener('change', event => {
          state[id].status = event.target.value;
          if (event.target.value !== 'New') state[id].done = true;
          save();
          render();
        });
        card.querySelector('textarea').addEventListener('input', event => {
          state[id].note = event.target.value;
          save();
        });
      });
    }
    function updateProgress() {
      const done = targets.filter(t => getTargetState(idFor(t)).done).length;
      const pct = Math.round((done / targets.length) * 100);
      els.progressText.textContent = `${done} / ${targets.length} contacted`;
      els.progressBar.style.width = `${pct}%`;
    }
    function exportState() {
      const rows = targets.map(target => {
        const saved = getTargetState(idFor(target));
        return { company: target.company, segment: target.segment, contact: target.public_contact, status: saved.status, done: saved.done, note: saved.note };
      });
      const blob = new Blob([JSON.stringify(rows, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'varholdt-outreach-state.json';
      a.click();
      URL.revokeObjectURL(url);
    }

    renderSegmentOptions();
    ['input', 'change'].forEach(evt => {
      els.search.addEventListener(evt, render);
      els.segment.addEventListener(evt, render);
      els.priority.addEventListener(evt, render);
      els.statusFilter.addEventListener(evt, render);
    });
    els.hideDone.addEventListener('click', () => {
      hideDone = !hideDone;
      els.hideDone.textContent = hideDone ? 'Show done' : 'Hide done';
      render();
    });
    els.export.addEventListener('click', exportState);
    render();
  </script>
